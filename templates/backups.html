{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Gestão de Backups</h2>
    <form action="{{ url_for('create_backup') }}" method="POST">
        <button type="submit" class="btn btn-primary">Gerar Backup Cifrado</button>
    </form>
</div>

<div class="card">
    <div class="card-body">
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Nome do Ficheiro</th>
                    <th>Tamanho</th>
                    <th>SHA256 Hash</th>
                    <th>Data de Criação</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                {% for backup in backups %}
                <tr>
                    <td>{{ backup.filename }}</td>
                    <td>{{ backup.size }} bytes</td>
                    <td><code>{{ backup.hash[:16] }}...</code></td>
                    <td>{{ backup.created_at }}</td>
                    <td>
                        <form action="{{ url_for('restore_backup', filename=backup.filename) }}" method="POST" class="d-inline">
                            <button type="submit" class="btn btn-sm btn-warning">Simular Restauro</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
